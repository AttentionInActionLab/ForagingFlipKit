<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ForagingFlipKit - Editor</title>

<style>
body { font-family: Arial; margin:20px; background:#f4f4f4; }

.tab-header {
  display:inline-block;
  padding:8px 12px;
  background:#eee;
  border:1px solid #ccc;
  border-bottom:none;
  cursor:pointer;
  border-radius:6px 6px 0 0;
  margin-right:4px;
}

.tab-header.active {
  background:white;
  font-weight:bold;
}

.tab-panel {
  border:1px solid #ccc;
  border-radius:6px;
  padding:15px;
  background:white;
  display:none;
}

label { display:block; margin-top:8px; }
input[type="number"] { width:120px; }
textarea { width:100%; height:80px; font-family:monospace; }

.patch-box,.element-box {
  border:1px solid #ccc;
  padding:10px;
  margin:10px 0;
  background:#fafafa;
}

.image-list {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.image-item {
  border:1px solid #ccc;
  padding:5px;
  background:white;
  text-align:center;
  width:120px;
  font-size:12px;
}

.image-item img {
  max-width:100px;
  max-height:80px;
  display:block;
  margin:auto;
  margin-bottom:5px;
}

.title-container {
  display: flex;
  align-items: center;
  gap: 12px;
}

.title-image {
  height: 100px;
  width: auto;
  border-radius: 15px;
}

button { margin-top:8px; }

#saveBtn { float:right; }

.file-bar {
  border:1px solid #ccc;
  border-radius:6px;
  padding:15px;
  background:white;
}
</style>
</head>
<body>

<div class="title-container">
  <img src="../misc/attention-in-action-lab.png" class="title-image">
  <h1>ForagingFlipKit - Editor</h1>
</div>

<br/><br/>

<div class="file-bar">
Config File: <input type="file" id="fileInput">
<button id="saveBtn" onclick="saveConfig()">💾 Save</button>
</div>

<br/><br/>

<div id="tabHeaders">
  <div class="tab-header" onclick="switchTab('display', this)">Display</div>
  <div class="tab-header" onclick="switchTab('positions', this)">Stimulus Positions</div>
  <div class="tab-header" onclick="switchTab('points', this)">Points & Feedback</div>
  <div class="tab-header" onclick="switchTab('patchTypes', this)">Patch Types</div>
  <div class="tab-header" onclick="switchTab('design', this)">Design</div>
  <div class="tab-header" onclick="switchTab('consent', this)">Consent & Instructions</div>
  <div class="tab-header" onclick="switchTab('data', this)">Data</div>
</div>

<div id="tabContent">
  <div id="displayPanel" class="tab-panel"></div>
  <div id="positionsPanel" class="tab-panel"></div>
  <div id="pointsPanel" class="tab-panel"></div>
  <div id="patchTypesPanel" class="tab-panel"></div>
  <div id="designPanel" class="tab-panel"></div>
  <div id="consentPanel" class="tab-panel"></div>
  <div id="dataPanel" class="tab-panel"></div>
</div>

<script>
let config = {};
const STIMULI_PATH = "../stimuli/";

// LOAD
document.getElementById("fileInput").addEventListener("change", e=>{
  const reader = new FileReader();
  reader.onload = ev=>{
    const text = ev.target.result;
    const jsonText = text.replace(/^window\.config\s*=\s*/,"").trim().replace(/;$/,"");
    config = eval("(" + jsonText + ")");
    renderAllTabs();
    switchTab("display", document.querySelector(".tab-header"));
  };
  reader.readAsText(e.target.files[0]);
});

// TAB SWITCH
function switchTab(tab, el){
  document.querySelectorAll(".tab-header").forEach(h=>h.classList.remove("active"));
  if(el) el.classList.add("active");
  document.querySelectorAll(".tab-panel").forEach(p=>p.style.display="none");
  document.getElementById(tab+"Panel").style.display="block";
}

// INIT DEFAULTS
function renderAllTabs(){
  config.fullscreen ??= {};
  config.patch ??= {};
  config.patch.indicate_points ??= "both";

  config.points ??= {};
  config.feedback ??= {};
  config.grid ??= {};
  config.animation ??= {};
  config.patches ??= [];

  config.blocks ??= {};
  config.blocks.sequences ??= [];

  config.consent ??= {};
  config.data ??= {mode:"online"};

  renderDisplay();
  renderPositions();
  renderPoints();
  renderPatchTypes();
  renderDesign();
  renderConsent();
  renderData();
}

// DISPLAY
function renderDisplay(){
  const e = document.getElementById("displayPanel");
  e.innerHTML = `
    <label><input type="checkbox" id="fullscreen_mode" ${config.fullscreen.fullscreen_mode?"checked":""}> Enable Fullscreen</label>

    <label>Indicate Points:
      <select id="indicate_points">
        <option value="both" ${config.patch.indicate_points==="both"?"selected":""}>Both</option>
        <option value="positive" ${config.patch.indicate_points==="positive"?"selected":""}>Positive</option>
        <option value="negative" ${config.patch.indicate_points==="negative"?"selected":""}>Negative</option>
        <option value="none" ${config.patch.indicate_points==="none"?"selected":""}>None</option>
      </select>
    </label>

    <label>Size:
      <input type="number" id="size_w" value="${config.patch.size?.[0]||1920}">
      ×
      <input type="number" id="size_h" value="${config.patch.size?.[1]||1080}">
    </label>

    <label>Point Indicator HTML</label>
    <textarea id="point_indicator_html">${config.patch.point_indicator_html||""}</textarea>

    <label>Points Display HTML</label>
    <textarea id="points_display_html">${config.patch.points_display_html||""}</textarea>

    <label>Next Patch Click HTML</label>
    <textarea id="next_patch_click_html">${config.patch.next_patch_click_html||""}</textarea>
  `;
}

// POSITIONS
function renderPositions(){
  const e = document.getElementById("positionsPanel");
  e.innerHTML = `
    ${num("columns",config.grid.columns,"Columns")}
    ${num("rows",config.grid.rows,"Rows")}
    ${num("hspacing",config.grid.hspacing,"Horizontal distance")}
    ${num("vspacing",config.grid.vspacing,"Vertical distance")}
    ${num("hjitter",config.grid.hjitter,"Horizontal jitter")}
    ${num("vjitter",config.grid.vjitter,"Vertical jitter")}
    ${num("hoffset",config.grid.hoffset,"Horizontal offset")}
    ${num("voffset",config.grid.voffset,"Vertical offset")}
    ${num("speed",config.animation.speed,"Motion speed")}
    <label>When stimuli used up: <input type="text" id="on_used_up" value="${config.grid.on_used_up||""}"></label>
    <label>When patch complete: <input type="text" id="on_patch_done" value="${config.grid.on_patch_done||""}"></label>
  `;
}

// POINTS
function renderPoints(){
  const e = document.getElementById("pointsPanel");
  e.innerHTML = `
    ${num("max_points",config.points.max_points,"Max Points")}
    <label><input type="checkbox" id="feedback_enabled" ${config.feedback.enabled?"checked":""}> Enable Feedback</label>
    ${num("every_n_patches",config.feedback.every_n_patches,"Every N Patches")}
    <label>Feedback Text</label>
    <textarea id="feedback_text">${config.feedback.text||""}</textarea>
  `;
}

// PATCH TYPES
function renderPatchTypes(){
  const e = document.getElementById("patchTypesPanel");
  let html = "";

  config.patches.forEach((p,pi)=>{
    p.elements??=[];
    html += `<div class="patch-box">

      <label>ID: <input value="${p.id||""}" onchange="config.patches[${pi}].id=this.value"></label>
      <label>Name: <input value="${p.name||""}" onchange="config.patches[${pi}].name=this.value"></label>
      <label>Background Color: <input type="color" value="${p.background_color||"#000000"}" onchange="config.patches[${pi}].background_color=this.value"></label>
      <label>Travel Time (ms): <input type="number" value="${p.travel_time||1000}" onchange="config.patches[${pi}].travel_time=parseInt(this.value)"></label>
      <label>Intro HTML</label>
      <textarea onchange="config.patches[${pi}].intro=this.value">${p.intro||""}</textarea>

      <button onclick="addElement(${pi})">Add Element</button>
    `;

    p.elements.forEach((el,ei)=>{
      el.images??=[];
      el.trial_ends_when_all_collected ??= false;
      el.trial_ends_when_one_collected ??= false;

      html += `<div class="element-box">

        <label>Type:
          <select onchange="config.patches[${pi}].elements[${ei}].type=this.value">
            <option ${el.type==="target"?"selected":""}>target</option>
            <option ${el.type==="distractor"?"selected":""}>distractor</option>
          </select>
        </label>

        ${numInline("Amount",el.amount,pi,ei,"amount")}
        ${numInline("Points",el.points,pi,ei,"points")}

        <label>
          <input type="checkbox" ${el.collectible?"checked":""}
          onchange="config.patches[${pi}].elements[${ei}].collectible=this.checked">
          Collectible
        </label>

        <label>
          <input type="checkbox" ${el.trial_ends_when_all_collected?"checked":""}
          onchange="config.patches[${pi}].elements[${ei}].trial_ends_when_all_collected=this.checked">
          End trial when ALL collected
        </label>

        <label>
          <input type="checkbox" ${el.trial_ends_when_one_collected?"checked":""}
          onchange="config.patches[${pi}].elements[${ei}].trial_ends_when_one_collected=this.checked">
          End trial when ONE collected
        </label>

        <button onclick="selectImages(${pi},${ei})">Add Images</button>
        <div class="image-list">
          ${el.images.map(f=>renderImageItem(pi,ei,f)).join("")}
        </div>

        <button onclick="removeElement(${pi},${ei})">Remove Element</button>

      </div>`;
    });

    html += `<button onclick="removePatchType(${pi})">Remove Patch Type</button></div>`;
  });

  html += `<button onclick="addPatchType()">Add Patch Type</button>`;
  e.innerHTML = html;
}

// DESIGN / CONSENT / DATA (unchanged)
function renderDesign(){ document.getElementById("designPanel").innerHTML="(unchanged)"; }
function renderConsent(){ document.getElementById("consentPanel").innerHTML="(unchanged)"; }
function renderData(){ document.getElementById("dataPanel").innerHTML="(unchanged)"; }

// HELPERS
function num(id,val,label=id){return `<label>${label}: <input type="number" id="${id}" value="${val||0}"></label>`;}
function numInline(label,val,pi,ei,key){return `<label>${label}: <input type="number" value="${val||0}" onchange="config.patches[${pi}].elements[${ei}].${key}=parseInt(this.value)"></label>`;}
function renderImageItem(pi,ei,f){return `<div class="image-item"><img src="${STIMULI_PATH}${f}"><div>${f}</div></div>`;}
function addPatchType(){ config.patches.push({id:"",name:"NewType",elements:[]}); renderPatchTypes(); }
function removePatchType(i){ config.patches.splice(i,1); renderPatchTypes(); }
function addElement(pi){ config.patches[pi].elements.push({type:"target",amount:1,points:0,images:[]}); renderPatchTypes(); }
function removeElement(pi,ei){ config.patches[pi].elements.splice(ei,1); renderPatchTypes(); }
function selectImages(pi,ei){
  const input=document.createElement("input");
  input.type="file"; input.multiple=true; input.accept="image/*";
  input.onchange=e=>{
    Array.from(e.target.files).forEach(file=>{
      if(!config.patches[pi].elements[ei].images.includes(file.name))
        config.patches[pi].elements[ei].images.push(file.name);
    });
    renderPatchTypes();
  };
  input.click();
}

// SAVE
function updateConfig(){
  config.fullscreen.fullscreen_mode=document.getElementById("fullscreen_mode")?.checked??false;
  config.patch.indicate_points=document.getElementById("indicate_points")?.value || "both";
}

// SAVE FILE
async function saveConfig(){
  updateConfig();
  const content="window.config = "+JSON.stringify(config,null,2)+";";

  if(window.showSaveFilePicker){
    const handle=await window.showSaveFilePicker({suggestedName:"config.js"});
    const writable=await handle.createWritable();
    await writable.write(content);
    await writable.close();
  }
}

// INIT
renderAllTabs();
switchTab("display", document.querySelector(".tab-header"));
</script>
</body>
</html>
