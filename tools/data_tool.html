<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FFK DataTool</title>

<style>
body { font-family: Arial; margin:20px; background:#f4f4f4; }

.panel {
  border:1px solid #ccc;
  border-radius:6px;
  padding:15px;
  background:white;
  margin-bottom:15px;
}

button {
  margin:5px 5px 5px 0;
  font-size: 14px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
}

th { background:#eee; }

tr.selected { background:#d0e7ff; }

.controls { 
  margin-top:10px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
}

.title-container {
  display:flex;
  align-items:center;
  gap:12px;
}

.title-image {
  height:80px;
  border-radius:12px;
}

.checkbox-bar {
  margin-top:10px;
  font-size:14px;
  display:flex;
  gap:20px;
}
</style>
</head>

  <h1>ForagingFlipKit - DataTool</h1>
</div>

<br/>

<div class="panel">
  <table id="fileTable">
    <thead>
      <tr><th>#</th><th>Filename</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="controls">
    <input type="file" id="fileInput" multiple accept=".json,*.*" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">
      ➕ Add .json files
    </button>

    <button onclick="moveUp()">⬆️</button>
    <button onclick="moveDown()">⬇️</button>
    <button onclick="removeSelected()">❌</button>
  </div>
</div>

<div class="panel checkbox-bar">
  <label><input type="checkbox" id="legacyMode"> Legacy Mode</label>
  <label><input type="checkbox" id="addComputables" checked> Add computables</label>
</div>

<div class="panel">
  <button onclick="createCSV()">💾 Create long dataframe .csv</button>
</div>

<script>
let fileList = [];
let selectedIndex = null;

// -------- FILE HANDLING --------
document.getElementById("fileInput").addEventListener("change", e => {
  const files = Array.from(e.target.files);
  files.forEach(f => fileList.push(f));
  renderTable();
  e.target.value = "";
});

function renderTable(){
  const tbody = document.querySelector("#fileTable tbody");
  tbody.innerHTML = "";
  fileList.forEach((file,i)=>{
    const tr = document.createElement("tr");
    if(i === selectedIndex) tr.classList.add("selected");
    tr.innerHTML = `<td>${i+1}</td><td>${file.name}</td>`;
    tr.onclick = ()=>{ selectedIndex=i; renderTable(); };
    tbody.appendChild(tr);
  });
}

function removeSelected(){
  if(selectedIndex===null) return;
  fileList.splice(selectedIndex,1);
  selectedIndex=null;
  renderTable();
}

function moveUp(){
  if(selectedIndex===null||selectedIndex===0) return;
  [fileList[selectedIndex-1],fileList[selectedIndex]] =
  [fileList[selectedIndex],fileList[selectedIndex-1]];
  selectedIndex--;
  renderTable();
}

function moveDown(){
  if(selectedIndex===null||selectedIndex===fileList.length-1) return;
  [fileList[selectedIndex+1],fileList[selectedIndex]] =
  [fileList[selectedIndex],fileList[selectedIndex+1]];
  selectedIndex++;
  renderTable();
}

// -------- MAIN PROCESSING --------
async function createCSV(){
  if(fileList.length===0){
    alert("No files selected.");
    return;
  }

  const legacyMode = document.getElementById("legacyMode").checked;
  const addComputablesFlag = document.getElementById("addComputables").checked;

  let rows = [];

  for(let fileIndex=0; fileIndex<fileList.length; fileIndex++){
    const file = fileList[fileIndex];
    const text = await file.text();
    const data = parseJSONFlexible(text);
    const participantID = fileIndex + 1;

    const patches = data.filter(d => d.trial_type === "foraging-patch");

    // -------- compute min trial index for this participant --------
    let minTrialIndex = Infinity;
    patches.forEach(p => {
      const idx = p.trial_index ?? 0;
      if(idx < minTrialIndex) minTrialIndex = idx;
    });
    if(minTrialIndex === Infinity) minTrialIndex = 0;

    patches.forEach(patch => {

      const trialIndex = (patch.trial_index ?? 0) - minTrialIndex;
      const trialTime = patch.time_in_trial != null ? patch.time_in_trial / 1000 : null;
      const condition = patch.condition ?? "";
      const patchStart = patch.patch_start_time ?? 0;

      const selections = patch.selections || [];

      selections.forEach((sel, selIndex) => {
        const pos = sel.selection_position || [null,null];

        const selTime = sel.selection_time != null 
          ? (sel.selection_time - patchStart) / 1000 
          : null;

        let role, type, supplementaryImage = null;
        if(legacyMode){
          role = sel.type ?? "";
          type = sel.actual_image ? sel.actual_image.replace(/^.*[\\/]/,"") : "";
        } else {
          role = sel.role ?? "";
          type = sel.type ?? "";
          supplementaryImage = sel.actual_image ? sel.actual_image.replace(/^.*[\\/]/,"") : "";
        }

        let row = {
          M_Participant_ID: participantID,
          M_Condition_Name: condition,
          M_Trial_Index: trialIndex,
          M_Trial_Time_in_Patch: trialTime,
          M_Selection_Index: selIndex,
          M_Selection_Role: role,
          M_Selection_Type: type,
          M_Selection_X: pos[0],
          M_Selection_Y: pos[1],
          M_Selection_Time: selTime,
          M_Selection_Value: sel.points ?? 1
        };

        if(!legacyMode){
          row.S_Selection_Image = supplementaryImage;
        }

        rows.push(row);
      });

    });
  }

  if(rows.length===0){
    alert("No valid data found.");
    return;
  }

  if(addComputablesFlag){
    rows = addComputables(rows);
  }

  const headers = Object.keys(rows[0]);
  const csv = [
    headers.join(","),
    ...rows.map(r => headers.map(h => JSON.stringify(r[h] ?? "")).join(","))
  ].join("\n");

  downloadCSV(csv);
}

// -------- COMPUTABLES --------
function addComputables(rows){

  const participants = [...new Set(rows.map(r=>r.M_Participant_ID))].sort((a,b)=>a-b);
  const pMap = new Map(participants.map((p,i)=>[p,i]));

  const conditions = [...new Set(rows.map(r=>r.M_Condition_Name))].sort();
  const cMap = new Map(conditions.map((c,i)=>[c,i]));

  rows.forEach(r=>{
    r.C_Participant_Index = pMap.get(r.M_Participant_ID);
    r.C_Condition_Index = cMap.get(r.M_Condition_Name);
  });

  const trials = {};
  rows.forEach(r=>{
    const key = `${r.M_Participant_ID}_${r.M_Trial_Index}`;
    if(!trials[key]) trials[key] = [];
    trials[key].push(r);
  });

  Object.values(trials).forEach(trialRows => {

    trialRows.sort((a,b)=>a.M_Selection_Index - b.M_Selection_Index);

    let targetCount = 0;
    let lastTargetTime = null;
    let lastTargetType = null;

    trialRows.forEach(r=>{

      const isTarget = r.M_Selection_Role === "target";

      if(isTarget){
        targetCount++;
        r.C_Selection_Target_Count = targetCount;

        if(lastTargetTime === null){
          r.C_Selection_Inter_target_Time = NaN;
          r.C_Selection_Rate_of_Return =
            (r.M_Selection_Time > 0)
            ? r.M_Selection_Value / r.M_Selection_Time
            : NaN;
        } else {
          const dt = r.M_Selection_Time - lastTargetTime;
          r.C_Selection_Inter_target_Time = dt;
          r.C_Selection_Rate_of_Return =
            (dt > 0) ? r.M_Selection_Value / dt : NaN;
        }

        if(lastTargetType === null){
          r.C_Selection_Target_Switch = 0;
        } else {
          r.C_Selection_Target_Switch =
            (r.M_Selection_Type !== lastTargetType) ? 1 : 0;
        }

        lastTargetTime = r.M_Selection_Time;
        lastTargetType = r.M_Selection_Type;

      } else {
        r.C_Selection_Target_Count = targetCount;
        r.C_Selection_Inter_target_Time = NaN;
        r.C_Selection_Rate_of_Return = NaN;
        r.C_Selection_Target_Switch = 0;
      }

    });

    const maxTargets = targetCount;

    trialRows.forEach(r=>{
      r.C_Trial_Target_Count = maxTargets;
      r.C_Selection_Nth_Last_Target =
        (r.C_Selection_Target_Count > 0)
        ? (maxTargets - r.C_Selection_Target_Count + 1)
        : NaN;
    });

  });

  return rows;
}

// -------- PARSER --------
function parseJSONFlexible(text){
  try {
    const json = JSON.parse(text);
    return Array.isArray(json) ? json : [json];
  } catch {
    return text.split(/\r?\n/)
      .filter(l => l.trim())
      .map(l => { try{return JSON.parse(l)}catch{return null} })
      .filter(x=>x);
  }
}

async function downloadCSV(content){

  // ---- try modern save dialog ----
  if (typeof window.showSaveFilePicker === "function") {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: "output.csv",
        types: [{
          description: "CSV file",
          accept: { "text/csv": [".csv"] }
        }]
      });

      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();

      return; // ✅ success → stop here

    } catch (err) {
      // ❗ DO NOT alert here — just fallback silently
      console.warn("Modern save failed, falling back:", err);
    }
  }

  // ---- fallback (works everywhere) ----
  try {
    const blob = new Blob([content], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "output.csv";
    a.style.display = "none";

    document.body.appendChild(a);
    a.click();

    // cleanup
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 100);

  } catch (err) {
    console.error(err);
    alert("Saving failed in this browser.");
  }
}
</script>
